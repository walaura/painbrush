<body>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      font-smooth: never;
      -webkit-font-smoothing: none;
      --window: #c0c0c0;
    }
    body {
      background: #0100a8;
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
    }
    img {
      width: 260px;
      height: 360px;
      border-bottom: 1px solid
        hsla(from var(--window) h s calc(l + 25));
      border-right: 1px solid
        hsla(from var(--window) h s calc(l + 25));
      border-left: 1px solid
        hsla(from var(--window) h s calc(l - 200));
      border-top: 1px solid hsla(from var(--window) h s 0);
    }
    .window {
      background: var(--window);
      padding: 1em;
      border-top: 1px solid hsla(from var(--window) h s calc(l + 25));
      border-left: 1px solid hsla(from var(--window) h s calc(l + 25));
      border-right: 1px solid
        hsla(from var(--window) h s calc(l - 200));
      border-bottom: 1px solid hsla(from var(--window) h s 0);
      box-shadow:
        inset 1px 1px 0 0 hsla(from var(--window) h s calc(l + 50)),
        inset -1px -1px 0 0 hsla(from var(--window) h s calc(l - 25));

      display: flex;
      gap: 1em;
    }
    p {
      max-width: 10em;
    }
    .controls {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1em;
    }
    .inputs {
      flex: 1 0 0;
      padding: 1em;
      border: 1px solid hsla(from var(--window) h s calc(l - 25));
      box-shadow:
        1px 1px 0 0 hsla(from var(--window) h s calc(l + 50)),
        inset 1px 1px 0 0 hsla(from var(--window) h s calc(l + 50));

      display: flex;
      writing-mode: vertical-lr;
      flex-direction: column;
      gap: 0.5em;
      > * {
        flex: 1 1 0;
      }
    }
  </style>
  <div class="window">
    <div class="controls">
      <p>
        This works in a browser too ig?? so yeah thats cool - super
        slow tho.
      </p>
      <div class="inputs">
        <input
          type="range"
          min="0"
          max="255"
          step="1"
        />
        <input
          type="range"
          min="0"
          max="255"
          step="1"
          value="60"
        />
        <input
          type="range"
          min="0"
          max="255"
          step="1"
          value="60"
        />
        <input
          type="range"
          min="0"
          step="0.01"
          max="10"
          value="2"
        />
      </div>
    </div>
    <img id="lol" />
  </div>
</body>

<script
  type="module"
  src="./index.ts"
/>
